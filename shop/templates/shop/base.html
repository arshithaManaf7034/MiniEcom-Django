<!DOCTYPE html>
<html>
<head>
    <title>MiniEcom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" href="/">MiniEcom</a>

    <div class="ms-auto">

        {% if user.is_authenticated %}
            <!-- After Login -->
            <span class="text-white me-2">Hi, {{ user.username }}</span>
            <a href="/cart/" class="btn btn-success btn-sm">Cart</a>
            <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>

        {% else %}
            <!-- Before Login -->
            <a href="/login/" class="btn btn-light btn-sm">Login</a>
            <a href="/register/" class="btn btn-warning btn-sm">Register</a>
        {% endif %}

    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
